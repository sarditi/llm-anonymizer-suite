
server {
    listen 8766;
    access_log /var/log/nginx/access.log combined;
    # 1. Serve the React Frontend
    location /llmtest {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /llmtest/index.html;
    }

    # 2. Proxy API requests to the Go Backend
    location /api/ {
        proxy_pass http://host.docker.internal:7700/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        proxy_buffering off;
        proxy_request_buffering off;

        proxy_intercept_errors off;

        proxy_read_timeout    6000s; # Time to wait for Go to respond 
    
        # Increase buffers if your JSON payloads are large
        proxy_buffers 8 16k;
        proxy_buffer_size 32k;

        # Ensure we don't have issues with large payloads if needed
        client_max_body_size 10M;
    }

    # 3. Redirect root to /llmtest (Only ONE block here)
    location = / {
        return 301 /llmtest;
    }
}