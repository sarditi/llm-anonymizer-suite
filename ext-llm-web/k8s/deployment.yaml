apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-llm-web
  labels:
    app: ext-llm-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ext-llm-web
  template:
    metadata:
      labels:
        app: ext-llm-web
    spec:
      containers:
        - name: ext-llm-web
          image: ext-llm-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ext-llm-web-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
